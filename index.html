<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Dorr — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2f0e9;
    --paper-2: #e8e4d8;
    --white: #fffdf8;
    --ink: #17160f;
    --ink-soft: #565349;
    --ink-faint: #8a8677;
    --line: #d6d1c1;
    --line-strong: #17160f;
    --accent: #2f5ce0;
    --accent-soft: #dde4fa;
    --font-display: 'Archivo', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'Space Mono', 'SFMono-Regular', Menlo, monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }

  /* ── PAGE SYSTEM ── */
  .page {
    position: fixed;
    inset: 0;
    overflow-y: auto;
    transition: transform 0.45s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.45s ease;
    background: var(--bg);
  }

  .page.hidden-right {
    transform: translateX(100%);
    opacity: 0;
    pointer-events: none;
  }

  .page.hidden-left {
    transform: translateX(-6%);
    opacity: 0;
    pointer-events: none;
  }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    background: rgba(242,240,233,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    z-index: 100;
    padding: 0 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    flex-shrink: 0;
  }

  .nav-name {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-soft);
    transition: color 0.15s;
  }

  .nav-links a:hover, .nav-links a.active { color: var(--accent); }

  /* ── HERO ── */
  .hero {
    position: relative;
    overflow: hidden;
    padding: 7rem 2.5rem 6rem;
    max-width: 800px;
    margin: 0 auto;
    border-bottom: 1px solid var(--line);
  }

  .hero-ghost {
    position: absolute;
    z-index: -1;
    right: -0.5rem;
    top: 42%;
    transform: translateY(-50%);
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(5.5rem, 13vw, 10.5rem);
    line-height: 0.82;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    color: transparent;
    -webkit-text-stroke: 1px var(--line);
    text-align: right;
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }

  .hero-eyebrow {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 1.75rem;
  }

  .hero-eyebrow::before {
    content: "";
    width: 7px;
    height: 7px;
    background: var(--accent);
    flex-shrink: 0;
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 7vw, 4.5rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 0.95;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    color: var(--ink);
  }

  .hero-meta {
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 2.25rem;
    line-height: 1.7;
  }

  .hero-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--accent);
    color: var(--white);
    background: var(--accent);
  }

  /* ── PROJECTS LIST ── */
  .projects-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 4rem 2.5rem;
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 3rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--line);
  }

  /* Project row — sticky text + scrolling images */
  .project {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: 100vh;
    border-bottom: 1px solid var(--line);
    position: relative;
  }

  .project:last-child { border-bottom: none; }

  .project-text {
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    padding: 4rem 3rem 4rem 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-self: start;
    overflow: hidden;
  }

  .project-ghost-num {
    position: absolute;
    z-index: -1;
    right: 1.5rem;
    top: 1.5rem;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 8rem;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 1px var(--line);
    pointer-events: none;
    user-select: none;
  }

  .project-number {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.08em;
    font-variant-numeric: tabular-nums;
    margin-bottom: 1.25rem;
  }

  .project-title {
    font-family: var(--font-display);
    font-size: clamp(1.5rem, 2.7vw, 2.1rem);
    font-weight: 800;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    line-height: 1.15;
    margin-bottom: 0.5rem;
  }

  .project-subtitle {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 1rem;
  }

  .project-phases {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .phase {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 3px 9px;
    border: 1px solid var(--line);
  }

  .project-status {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 9px;
    background: var(--accent);
    color: var(--white);
    width: fit-content;
  }

  .project-description {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.75;
    margin-bottom: 2rem;
    max-width: 42ch;
  }

  .view-project-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    border: 1px solid var(--line-strong);
    padding: 9px 16px;
    cursor: pointer;
    background: none;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    width: fit-content;
  }

  .view-project-btn:hover { color: var(--white); border-color: var(--accent); background: var(--accent); }

  .view-project-btn svg { transition: transform 0.15s; }
  .view-project-btn:hover svg { transform: translateX(3px); }

  /* Scrolling images panel */
  .project-images {
    padding: 4rem 0 4rem 3rem;
    border-left: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .image-slot {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    border: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--white);
    flex-shrink: 0;
  }

  .image-slot::before, .image-slot::after,
  .detail-media-slot::before, .detail-media-slot::after {
    content: "";
    position: absolute;
    width: 11px;
    height: 11px;
    z-index: 2;
    pointer-events: none;
  }
  .image-slot::before, .detail-media-slot::before {
    top: -1px; left: -1px;
    border-top: 2px solid var(--accent);
    border-left: 2px solid var(--accent);
  }
  .image-slot::after, .detail-media-slot::after {
    bottom: -1px; right: -1px;
    border-bottom: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
  }

  .image-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    cursor: zoom-in;
    transition: opacity 0.15s;
  }

  .image-slot img:hover { opacity: 0.88; }

  .image-slot-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-faint);
    text-align: center;
    padding: 0 1.5rem;
    line-height: 1.7;
  }

  .image-slot-empty {
    aspect-ratio: auto;
    min-height: 140px;
    border-style: dashed;
    padding: 1rem;
  }

  /* ── CONTACT ── */
  .contact-section {
    border-top: 1px solid var(--line);
    max-width: 800px;
    margin: 0 auto;
    padding: 4rem 2.5rem 6rem;
  }

  .contact-section h2 {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 1.5rem;
  }

  .contact-links {
    display: flex;
    gap: 2.5rem;
    flex-wrap: wrap;
  }

  .contact-link {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    border-bottom: 1px solid var(--line-strong);
    padding-bottom: 2px;
    transition: color 0.15s, border-color 0.15s;
  }

  .contact-link:hover { color: var(--accent); border-color: var(--accent); }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(10,9,6,0.94);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
  }

  .lightbox-close {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    background: none;
    border: none;
    color: var(--white);
    font-size: 28px;
    cursor: pointer;
    line-height: 1;
  }

  .lightbox-close:hover { color: var(--accent); }

  /* ══════════════════════════════════════════
     DETAIL PAGE
  ══════════════════════════════════════════ */
  #page-detail {
    display: flex;
    flex-direction: column;
  }

  .detail-nav {
    position: sticky;
    top: 0;
    background: rgba(242,240,233,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    z-index: 100;
    padding: 0 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    flex-shrink: 0;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-soft);
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.15s;
    padding: 0;
  }

  .back-btn:hover { color: var(--accent); }
  .back-btn svg { transition: transform 0.15s; }
  .back-btn:hover svg { transform: translateX(-3px); }

  .detail-nav-title {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* Detail hero */
  .detail-hero {
    max-width: 900px;
    margin: 0 auto;
    padding: 5rem 2.5rem 3rem;
    border-bottom: 1px solid var(--line);
    width: 100%;
  }

  .detail-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .detail-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 4.5vw, 3.25rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    line-height: 1.05;
    margin-bottom: 0.75rem;
  }

  .detail-subtitle {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 1.5rem;
  }

  .detail-phases {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  /* Detail body */
  .detail-body {
    max-width: 900px;
    margin: 0 auto;
    padding: 3rem 2.5rem 6rem;
    width: 100%;
  }

  .detail-description {
    font-size: 16px;
    color: var(--ink-soft);
    line-height: 1.8;
    max-width: 620px;
    margin-bottom: 4rem;
  }

  /* Design process breakdown */
  .process-section {
    margin-bottom: 4rem;
  }

  .process-step {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 1.5rem;
    padding: 2rem 0;
    border-top: 1px solid var(--line);
  }

  .process-step:last-child {
    border-bottom: 1px solid var(--line);
  }

  .process-step-num {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.06em;
    padding-top: 0.15rem;
  }

  .process-step-title {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    margin-bottom: 0.6rem;
  }

  .process-step-text {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.75;
    max-width: 62ch;
    margin-bottom: 1.25rem;
  }

  .process-step-media {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }

  .process-step-media .detail-media-slot img {
    aspect-ratio: 4/3;
  }

  /* Media grid on detail page */
  .detail-media-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--line);
  }

  .detail-media-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .detail-media-slot {
    position: relative;
    background: var(--white);
    border: 1px solid var(--line);
  }

  .detail-media-slot img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    cursor: zoom-in;
    transition: opacity 0.15s;
  }

  .detail-media-slot img:hover { opacity: 0.85; }

  .detail-media-slot video {
    width: 100%;
    aspect-ratio: 16/9;
    display: block;
    background: #000;
  }

  .detail-media-slot .media-caption {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-soft);
    padding: 8px 12px;
    border-top: 1px solid var(--line);
  }

  .detail-empty {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink-faint);
    font-style: italic;
  }

  /* ── MOBILE ── */
  @media (max-width: 700px) {
    nav, .detail-nav { padding: 0 1rem; }
    .nav-links { display: none; }
    .hero, .projects-section, .contact-section, .detail-hero, .detail-body { padding-left: 1rem; padding-right: 1rem; }
    .hero-ghost { display: none; }
    .project { grid-template-columns: 1fr; min-height: unset; }
    .project-text { position: relative; top: 0; height: auto; padding: 2.5rem 0 1.5rem; }
    .project-ghost-num { font-size: 5.5rem; top: 0.5rem; right: 0.5rem; }
    .project-images { padding: 0 0 2.5rem; border-left: none; border-top: 1px solid var(--line); }
    .detail-media-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     HOME PAGE
══════════════════════════════════════════ -->
<div class="page" id="page-home">

  <nav>
    <span class="nav-name" onclick="goHome()">Kevin Dorr</span>
    <ul class="nav-links" id="nav-links">
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <header class="hero">
    <p class="hero-eyebrow">Mechanical Engineering Portfolio</p>
    <h1 id="hero-name"></h1>
    <p class="hero-meta" id="hero-meta"></p>
    <div class="hero-tags">
      <span class="tag">Manufacturing</span>
      <span class="tag">Machine Design</span>
      <span class="tag">Robotics</span>
      <span class="tag">CAD / CAM</span>
      <span class="tag">Mechanisms</span>
    </div>
  </header>

  <main class="projects-section" id="projects">
    <p class="section-label">Project Index — Most Recent First</p>
    <div id="project-list"></div>
  </main>

  <section class="contact-section" id="contact">
    <h2>Contact</h2>
    <div class="contact-links" id="contact-links"></div>
  </section>

</div>

<!-- ══════════════════════════════════════════
     DETAIL PAGE
══════════════════════════════════════════ -->
<div class="page hidden-right" id="page-detail">

  <div class="detail-nav">
    <button class="back-btn" onclick="goHome()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      All Projects
    </button>
    <span class="detail-nav-title" id="detail-nav-title"></span>
  </div>

  <div class="detail-hero">
    <p class="detail-eyebrow" id="detail-eyebrow"></p>
    <h1 class="detail-title" id="detail-title"></h1>
    <p class="detail-subtitle" id="detail-subtitle"></p>
    <div class="detail-phases" id="detail-phases"></div>
  </div>

  <div class="detail-body">
    <p class="detail-description" id="detail-description"></p>

    <div class="process-section" id="detail-process"></div>

    <p class="detail-media-label">Photos & Video</p>
    <div class="detail-media-grid" id="detail-media-grid"></div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
/* ============================================================
   EDIT YOUR CONTENT HERE
   ============================================================ */

/* -- Header info ------------------------------------------- */
const NAME   = "Kevin Dorr";
const SCHOOL = "Virginia Tech";
const YEAR   = "Class of 2027";
const MAJOR  = "B.S. Mechanical Engineering";

/* -- Contact links ----------------------------------------- */
const CONTACT = [
  { label: "kevin23@vt.edu",  href: "mailto:kevin23@vt.edu" },
  { label: "LinkedIn",        href: "https://linkedin.com/in/kevindorrvt" },
];

/* -- Projects (most recent first) --------------------------
   Fields:
     id          -- unique slug, don't change
     title       -- project name
     subtitle    -- secondary line, or null
     phases      -- tags shown under the title
     wip         -- true shows a WIP badge
     description -- short blurb shown on the home page card
     details     -- longer write-up shown on the project detail page
                    (can be the same as description if you prefer)
     images      -- photos shown on the HOME PAGE card (keep to 2-4)
                    Format: "images/filename.jpg"
                    Put files in an "images/" folder next to this HTML file.
     media       -- everything shown on the DETAIL PAGE
                    Mix photos and videos freely.
                    Each item is an object:
                      { type: "image", src: "images/foo.jpg", caption: "optional caption" }
                      { type: "video", src: "videos/bar.mp4", caption: "optional caption" }
                    Put video files in a "videos/" folder next to this HTML file.
                    Supported video formats: .mp4 (recommended), .webm, .mov
     process     -- OPTIONAL step-by-step breakdown, shown on the detail page
                    between the description and the photo/video grid.
                    Leave as [] (or omit) to skip this section entirely.
                    Each step is an object:
                      {
                        title: "Concept & Sketching",
                        text: "Short paragraph describing this stage.",
                        media: [
                          { type: "image", src: "images/foo/sketch1.jpg", caption: "optional caption" },
                          { type: "video", src: "videos/foo/test1.mp4", caption: "optional caption" },
                        ]  // optional, mix images and videos freely, same path rules as the media[] above
                      }
   ---------------------------------------------------------- */

/* ── page transitions ── */
function goHome() {
  document.getElementById('page-home').classList.remove('hidden-left');
  const detail = document.getElementById('page-detail');
  detail.classList.add('hidden-right');
  detail.classList.remove('hidden-left');
  // scroll home page back to top of projects if coming from a project
  setTimeout(() => {
    document.getElementById('page-home').scrollTop = 0;
  }, 10);
}

function goDetail(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;

  // populate detail page
  document.getElementById('detail-nav-title').textContent = p.title;
  document.getElementById('detail-eyebrow').textContent   = p.phases.join(' · ');
  document.getElementById('detail-title').textContent     = p.title;
  document.getElementById('detail-subtitle').textContent  = p.subtitle || '';
  document.getElementById('detail-description').textContent = p.details || p.description;

  // phases
  const phasesEl = document.getElementById('detail-phases');
  phasesEl.innerHTML = p.phases.map(ph => `<span class="phase">${ph}</span>`).join('');
  if (p.wip) phasesEl.innerHTML += `<span class="project-status">WIP</span>`;

  // design process breakdown
  const processEl = document.getElementById('detail-process');
  processEl.innerHTML = '';
  if (p.process && p.process.length > 0) {
    p.process.forEach((step, i) => {
      const stepEl = document.createElement('div');
      stepEl.className = 'process-step';

      let mediaHtml = '';
      if (step.media && step.media.length > 0) {
        mediaHtml = `<div class="process-step-media">` + step.media.map(item => {
          if (item.type === 'video') {
            return `
              <div class="detail-media-slot">
                <video controls preload="metadata">
                  <source src="${item.src}">
                  Your browser does not support video.
                </video>
                ${item.caption ? `<div class="media-caption">${item.caption}</div>` : ''}
              </div>`;
          }
          return `
              <div class="detail-media-slot">
                <img src="${item.src}" alt="${item.caption || ''}" onclick="openLightbox('${item.src}')">
                ${item.caption ? `<div class="media-caption">${item.caption}</div>` : ''}
              </div>`;
        }).join('') + `</div>`;
      }

      stepEl.innerHTML = `
        <div class="process-step-num">${String(i + 1).padStart(2, '0')}</div>
        <div>
          <div class="process-step-title">${step.title}</div>
          <p class="process-step-text">${step.text}</p>
          ${mediaHtml}
        </div>`;
      processEl.appendChild(stepEl);
    });
  }

  // media grid
  const grid = document.getElementById('detail-media-grid');
  grid.innerHTML = '';
  if (!p.media || p.media.length === 0) {
    grid.innerHTML = `<p class="detail-empty">No photos or videos added yet.</p>`;
  } else {
    p.media.forEach(item => {
      const slot = document.createElement('div');
      slot.className = 'detail-media-slot';
      if (item.type === 'image') {
        slot.innerHTML = `
          <img src="${item.src}" alt="${item.caption || ''}" onclick="openLightbox('${item.src}')">
          ${item.caption ? `<div class="media-caption">${item.caption}</div>` : ''}`;
      } else if (item.type === 'video') {
        slot.innerHTML = `
          <video controls preload="metadata">
            <source src="${item.src}">
            Your browser does not support video.
          </video>
          ${item.caption ? `<div class="media-caption">${item.caption}</div>` : ''}`;
      }
      grid.appendChild(slot);
    });
  }

  // scroll detail page to top, then show it
  const detailPage = document.getElementById('page-detail');
  detailPage.scrollTop = 0;
  detailPage.classList.remove('hidden-right');

  document.getElementById('page-home').classList.add('hidden-left');
}

/* ── lightbox ── */
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

/* ── render image on home card ── */
function renderHomeImages(pid, imagePaths) {
  const grid = document.getElementById('grid-' + pid);
  if (!grid) return;
  grid.innerHTML = '';
  if (!imagePaths || imagePaths.length === 0) {
    grid.innerHTML = `<div class="image-slot image-slot-empty">
      <span class="image-slot-label">Add paths to the images[ ] array in the code</span>
    </div>`;
    return;
  }
  imagePaths.forEach(src => {
    const slot = document.createElement('div');
    slot.className = 'image-slot';
    const img = document.createElement('img');
    img.src = src; img.alt = '';
    img.onclick = () => openLightbox(src);
    img.onerror = () => { slot.innerHTML = `<span class="image-slot-label">File not found:<br>${src}</span>`; };
    slot.appendChild(img);
    grid.appendChild(slot);
  });
}

/* ── apply config ── */
function applyConfig() {
  document.querySelector('.nav-name').textContent    = NAME;
  document.getElementById('hero-name').textContent   = NAME;
  document.getElementById('hero-meta').textContent   = `${SCHOOL}\u00a0\u00a0/\u00a0\u00a0${YEAR}\u00a0\u00a0/\u00a0\u00a0${MAJOR}`;
  const cl = document.getElementById('contact-links');
  cl.innerHTML = CONTACT.map(c => `<a class="contact-link" href="${c.href}">${c.label}</a>`).join('');
}

/* ── render home project list ── */
function renderProjects() {
  const list = document.getElementById('project-list');
  list.innerHTML = '';
  projects.forEach((p, i) => {
    const num     = String(projects.length - i).padStart(2, '0');
    const total   = String(projects.length).padStart(2, '0');
    const el      = document.createElement('article');
    el.className  = 'project';
    el.id         = 'proj-' + p.id;

    const phasesHtml = p.phases.map(ph => `<span class="phase">${ph}</span>`).join('');
    const wipHtml    = p.wip ? `<div class="project-status" style="margin-bottom:1.5rem;">WIP</div>` : '';
    const subHtml    = p.subtitle ? `<div class="project-subtitle">${p.subtitle}</div>` : '';

    el.innerHTML = `
      <div class="project-text">
        <span class="project-ghost-num" aria-hidden="true">${num}</span>
        <div class="project-number">NO. ${num} / ${total}</div>
        <div class="project-title">${p.title}</div>
        ${subHtml}
        <div class="project-phases">${phasesHtml}</div>
        ${wipHtml}
        <div class="project-description">${p.description}</div>
        <button class="view-project-btn" onclick="goDetail('${p.id}')">
          View Project
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div class="project-images" id="grid-${p.id}"></div>`;

    list.appendChild(el);
    renderHomeImages(p.id, p.images);
  });
}

/* ── nav highlight ── */
const navObserver = new IntersectionObserver(entries => {
  entries.forEach(e => {
    const link = document.querySelector(`nav a[href="#${e.target.id}"]`);
    if (link) link.classList.toggle('active', e.isIntersecting);
  });
}, { threshold: 0.2 });
['projects','contact'].forEach(id => {
  const el = document.getElementById(id);
  if (el) navObserver.observe(el);
});

applyConfig();
renderProjects();
</script>
